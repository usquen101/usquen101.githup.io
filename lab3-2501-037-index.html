<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8">
        <title>登录注册系统</title>
        <link rel="stylesheet" href="./css/lab3-2501-037-index.css">
    </head>
    <body>
        <!--背景图示例，可替换为自己的照片-->
        <div class="bg-img"></div>
        <!--登录注册弹窗-->
        <div class="login-dialog" id="loginDialog">
        <!--登录模块-->
        <div class="login-box" id="loginBox">
            <h2>登录</h2>
            <div class="input-group">
                <label>用户名：</label>
                <input type="text" id="loginUsername" placeholder="请输入用户名">
            </div>
            <div class="input-group">
                <label>密码</label>
                <input type="password" id="loginpassword" placeholder="请输入密码">
            </div>
            <div class="btn-group">
                <button onclick="login()">登录</button>
                <button onclick="showRegister()">去注册</button>
            </div>
        </div>
        <!--注册模块（默认隐藏）-->
        <div class="Register-box" id="RegisterBox">
            <h2>注册</h2>
            <div class="input-group">
                <label>用户名：</label>
                <input type="text" id="RegPassword" id="regUsername" placeholder="请输入用户名">
            </div>
            <div class="input-group">
                <label>密码：</label>
                <input type="password" id="RegPassword"placeholder="请输入密码">
            </div>
            <div class="input-group">
                <label>确认密码：</label>
                <input type="password" id="RegPassword2"placeholder="请再次输入密码">
            </div>
            <div class="btn-group">
                <button onclick="register()">注册</button>
                <button onclick="showlogin()">去登录</button>
            </div>
        </div>
        </div>
        <script>
            document.getElementById('loginBOX').style.display ='none';
            function showRegister(){
                document.getElementById('registerBox').style.display ='black';
                function showlogin(){
                    let Username=
                    document.getElementById('regUsername').value.trim();
                    let password=
                    document.getElementById('loginPassword').value.trim();
                     let password2=
                    document.getElementById('loginPassword').value.trim();
                    if(!Username||!password2||!password2){
                        alert("用户名和密码不能为空")；
                        return;
                    }
                    if(password!=password2){
                        alert("两次密码输入不一致！")；
                        return;
                    }
                    localStorage.setItem(Username,password);
                    alert("注册成功！请登录");
                    showlogin();
                }
                function login(){
                    let Username=document.getElementById('loginusername').value.trim();
                    let Username=document.getElementById('loginpassword').value.trim();
                    if(!Username || !password){
                        alert("用户名和密码不能为空！")；
                        return;
                    }
                    let storedPwd = localStorage.getItem(Username);
                    if(storedPwd&&storedPwd==password){
                        alert("登陆成功！");
                        document.getElementById('loginDialog').style.display = 'none'; 

                    }else{
                        alert("用户名或密码错误！")；
                    }
                }
            }
        </script>
    </body>
</html>
